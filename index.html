<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Aylesbury HSS Shakha</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;

  background:
    radial-gradient(circle at top,#1f2a44 0%,#0b1220 45%,#05070d 100%);

  color:white;
}

.container{
  width:100%;
  max-width:420px;

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter:blur(24px);
  -webkit-backdrop-filter: blur(24px);

  border-radius:28px;

  padding:28px;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.55),
    inset 0 1px 1px rgba(255,255,255,0.06);
}

h1{
  text-align:center;
  font-size:28px;
  font-weight:700;
  margin-bottom:6px;
}

.subtitle{
  text-align:center;
  color:rgba(255,255,255,0.6);
  font-size:14px;
  margin-bottom:26px;
}

label{
  display:block;
  margin-top:18px;
  margin-bottom:8px;
  font-size:14px;
  color:rgba(255,255,255,0.8);
}

input{
  width:100%;
  padding:14px 16px;

  border:none;
  outline:none;

  border-radius:16px;

  background:rgba(255,255,255,0.08);

  color:white;

  font-size:15px;

  border:1px solid rgba(255,255,255,0.08);

  transition:0.2s;
}

input:hover{
  background:rgba(255,255,255,0.1);
}

input:focus{
  border-color:#3b82f6;
  background:rgba(255,255,255,0.11);
}

input::placeholder{
  color:rgba(255,255,255,0.35);
}

.counterBox{
  margin-top:18px;
}

.counterLabel{
  margin-bottom:10px;
  color:rgba(255,255,255,0.85);
  font-size:14px;
}

.counter{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:rgba(255,255,255,0.05);

  border-radius:18px;

  padding:10px 14px;

  border:1px solid rgba(255,255,255,0.08);
}

.counter button{
  width:42px;
  height:42px;

  border:none;
  border-radius:50%;

  background:#2563eb;

  color:white;

  font-size:22px;
  cursor:pointer;

  transition:0.2s;
}

.counter button:hover{
  background:#3b82f6;
  transform:scale(1.05);
}

.counter span{
  font-size:18px;
  font-weight:600;
}

.submitBtn{
  width:100%;
  margin-top:28px;

  padding:15px;

  border:none;
  border-radius:18px;

  background:linear-gradient(135deg,#2563eb,#3b82f6);

  color:white;

  font-size:16px;
  font-weight:600;

  cursor:pointer;

  transition:0.25s;
}

.submitBtn:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 25px rgba(59,130,246,0.35);
}

.submitBtn:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

#message{
  margin-top:18px;
  text-align:center;
  font-size:15px;
  font-weight:500;
}

.footer{
  margin-top:22px;
  text-align:center;
  color:rgba(255,255,255,0.4);
  font-size:11px;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="container">

<h1>Aylesbury HSS Shakha</h1>

<div class="subtitle">
Event Registration
</div>

<form id="eventForm">

<label>Full Name *</label>

<input
  type="text"
  id="name"
  placeholder="Enter your name"
  required
/>

<label>Phone Number *</label>

<input
  type="tel"
  id="phone"
  placeholder="07123456789"
  pattern="[0-9+ ]{10,15}"
  required
/>

<label>Email (Optional)</label>

<input
  type="email"
  id="email"
  placeholder="example@email.com"
/>

<div class="counterBox">

<div class="counterLabel">Adults</div>

<div class="counter">

<button type="button" id="adultMinus">−</button>

<span id="adultCount">1</span>

<button type="button" id="adultPlus">+</button>

</div>
</div>

<div class="counterBox">

<div class="counterLabel">Children</div>

<div class="counter">

<button type="button" id="childMinus">−</button>

<span id="childCount">0</span>

<button type="button" id="childPlus">+</button>

</div>
</div>

<button class="submitBtn" type="submit">
Register
</button>

<div id="message"></div>

</form>

<div class="footer">
Your information is securely stored for event registration purposes only.
</div>

</div>

<script>

let adults = 1;
let children = 0;

const adultCount = document.getElementById("adultCount");
const childCount = document.getElementById("childCount");

document.getElementById("adultPlus").addEventListener("click", () => {
  adults++;
  adultCount.innerText = adults;
});

document.getElementById("adultMinus").addEventListener("click", () => {
  if (adults > 1) {
    adults--;
    adultCount.innerText = adults;
  }
});

document.getElementById("childPlus").addEventListener("click", () => {
  children++;
  childCount.innerText = children;
});

document.getElementById("childMinus").addEventListener("click", () => {
  if (children > 0) {
    children--;
    childCount.innerText = children;
  }
});

const form = document.getElementById("eventForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const submitBtn = document.querySelector(".submitBtn");

  submitBtn.disabled = true;
  submitBtn.innerText = "Registering...";

  const payload = {

    name: document.getElementById("name").value.trim(),

    phone: document.getElementById("phone").value.trim(),

    email: document.getElementById("email").value.trim(),

    adults: adults,

    children: children
  };

  try {

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbzxUIUEOxe7HE3stSB5yAzJzepFAl535ZpapV2AE5VW6wuS_prasJvFMN4AW2OrwPxc4g/exec",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify(payload)
      }
    );

    if (!response.ok) {
      throw new Error("Server error");
    }

    const data = await response.json();

    if (data.status === "duplicate") {

      message.innerText = "Already registered";
      message.style.color = "#ff453a";

    } else if (data.status === "waitlist") {

      message.innerText = "Added to waiting list";
      message.style.color = "#ffd60a";

    } else {

      message.innerText = "Registration successful ✓";
      message.style.color = "#32d74b";

      form.reset();

      adults = 1;
      children = 0;

      adultCount.innerText = adults;
      childCount.innerText = children;
    }

  } catch (err) {

    console.error(err);

    message.innerText = "Network error";
    message.style.color = "#ff453a";

  } finally {

    submitBtn.disabled = false;
    submitBtn.innerText = "Register";
  }
});

</script>

</body>
</html>
