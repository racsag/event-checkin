<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Check-In</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: radial-gradient(circle at top, #1b2436, #0b1220);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: white;
}

.container {
  width: 92%;
  max-width: 420px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
  margin: 0;
  font-size: 24px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 12px 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.25);
  color: white;
  outline: none;
}

input::placeholder {
  color: rgba(255,255,255,0.4);
}

/* Counter */
.counter {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

.counter button {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: #3b82f6;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.counter span {
  font-size: 16px;
}

/* Button */
button {
  width: 100%;
  margin-top: 18px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #3b82f6;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

#message {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
}

.footer {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-top: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Event Check-In</h2>
<div class="subtitle">Welcome</div>

<form id="form">

<input name="name" placeholder="Full Name" required>
<input name="phone" placeholder="Phone Number" required>
<input name="email" placeholder="Email (optional)">

<!-- Adults -->
<label>Adults</label>
<div class="counter">
  <button type="button" onclick="adults--,update()">-</button>
  <span id="adultCount">1</span>
  <button type="button" onclick="adults++,update()">+</button>
</div>

<!-- Children -->
<label>Children</label>
<div class="counter">
  <button type="button" onclick="children--,update()">-</button>
  <span id="childCount">0</span>
  <button type="button" onclick="children++,update()">+</button>
</div>

<button type="submit">Submit</button>

<div id="message"></div>

</form>

<div class="footer">
Data used only for event registration
</div>

</div>

<script>
let adults = 1;
let children = 0;

function update() {
  if (adults < 1) adults = 1;
  if (children < 0) children = 0;
  document.getElementById("adultCount").innerText = adults;
  document.getElementById("childCount").innerText = children;
}
update();

const form = document.getElementById("form");
const msg = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    name: form.name.value,
    phone: form.phone.value,
    email: form.email.value,
    adults,
    children,
    date: new Date().toISOString().split("T")[0]
  };

  const res = await fetch("https://worker1.racank86.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.result === "DUPLICATE") {
    msg.innerText = "Already registered";
    msg.style.color = "#ff3b30";
  } else {
    msg.innerText = "Registration successful ✓";
    msg.style.color = "#34c759";
    form.reset();
    adults = 1;
    children = 0;
    update();
  }
});
</script>

</body>
</html>
