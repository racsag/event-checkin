<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aylesbury HSS</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#0b1220;
  color:white;
}

/* MAIN LAYOUT */
.container{
  max-width:420px;
  margin:60px auto;
  padding:20px;
}

/* FORM */
input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* ADMIN BUTTON */
.adminBtn{
  position:fixed;
  top:15px;
  right:15px;
  width:auto;
  padding:8px 12px;
  background:#222;
  font-size:12px;
}

/* MODAL BACKGROUND */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

/* LOGIN BOX */
.box{
  background:#1f2a44;
  padding:20px;
  border-radius:10px;
  width:300px;
}

/* DASHBOARD */
.dashboard{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b1220;
  padding:20px;
  overflow:auto;
}

.card{
  background:#1f2a44;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}

.closeBtn{
  background:red;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- ADMIN BUTTON -->
<button class="adminBtn" onclick="openLogin()">Admin</button>

<!-- REGISTRATION -->
<div class="container">

<h2>Aylesbury HSS</h2>

<input id="name" placeholder="Name"/>
<input id="phone" placeholder="Phone"/>

<button onclick="submitForm()">Register</button>

<div id="msg"></div>

</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="box">

    <h3>Admin Login</h3>

    <input type="password" id="pass" placeholder="Password"/>

    <button onclick="login()">Login</button>

    <button class="closeBtn" onclick="closeLogin()">Close</button>

    <div id="error"></div>

  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <h2>Admin Dashboard</h2>

  <div class="card">
    <h3>Stats</h3>
    <div id="stats">Loading...</div>
    <button onclick="loadStats()">Refresh</button>
  </div>

  <button class="closeBtn" onclick="closeDashboard()">Close Dashboard</button>

</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzxUIUEOxe7HE3stSB5yAzJzepFAl535ZpapV2AE5VW6wuS_prasJvFMN4AW2OrwPxc4g/exec";
const ADMIN_PASSWORD = "7777";

/* OPEN LOGIN */
function openLogin(){
  document.getElementById("loginModal").style.display = "flex";
}

function closeLogin(){
  document.getElementById("loginModal").style.display = "none";
}

/* LOGIN */
function login(){

  const p = document.getElementById("pass").value;

  if(p === ADMIN_PASSWORD){

    localStorage.setItem("admin", "true");

    document.getElementById("loginModal").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadStats();

  } else {
    document.getElementById("error").innerText = "Wrong password";
  }
}

/* CLOSE DASHBOARD */
function closeDashboard(){
  document.getElementById("dashboard").style.display = "none";
}

/* AUTO LOGIN */
window.onload = () => {
  if(localStorage.getItem("admin") === "true"){
    document.getElementById("dashboard").style.display = "block";
    loadStats();
  }
};

/* LOAD STATS */
async function loadStats(){

  const res = await fetch(WEBAPP_URL, {
    method: "POST",
    body: JSON.stringify({ action: "stats" })
  });

  const data = await res.json();

  document.getElementById("stats").innerHTML =
    "Total: " + data.data.total +
    "<br>Checked-in: " + data.data.checkedIn;
}

/* FORM SUBMIT */
async function submitForm(){

  const payload = {
    action: "register",
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  };

  const res = await fetch(WEBAPP_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  document.getElementById("msg").innerText =
    data.status === "duplicate"
      ? "Already registered"
      : "Success ✔";
}

</script>

</body>
</html>
