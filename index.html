<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Check-In</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:#fff;
}

.container{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.15);
}

h1{text-align:center;margin-bottom:5px}
.subtitle{text-align:center;opacity:0.7;margin-bottom:20px}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

input::placeholder{color:#aaa}

.button-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:15px 0;
}

.btn{
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

.btn.active{
  background:#22c55e;
  transform:scale(1.05);
}

#msg{
  text-align:center;
  margin:10px 0;
  font-size:13px;
}

#submitBtn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#3b82f6;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.stats{
  display:none;
  text-align:center;
  margin-bottom:15px;
  font-size:14px;
  opacity:0.9;
}

.disclaimer{
  margin-top:15px;
  font-size:11px;
  opacity:0.6;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>Check-In</h1>
<div class="subtitle">Welcome to the event</div>

<!-- ADMIN ONLY -->
<div class="stats" id="statsBox">
  Adults: <span id="adults">0</span> |
  Children: <span id="children">0</span> |
  Total: <span id="total">0</span>
</div>

<form id="form">
  <input id="name" placeholder="Full Name *" required>
  <input id="email" placeholder="Email (optional)">
  <input id="phone" placeholder="UK Phone (07123456789)" required>

  <div class="button-grid">
    <button type="button" class="btn" onclick="selectGroup(event,1,0)">1A</button>
    <button type="button" class="btn" onclick="selectGroup(event,2,0)">2A</button>
    <button type="button" class="btn" onclick="selectGroup(event,1,1)">1A+1C</button>
    <button type="button" class="btn" onclick="selectGroup(event,1,2)">1A+2C</button>
  </div>

  <div id="msg"></div>

  <button id="submitBtn">Complete Check-In</button>
</form>

<div class="disclaimer">
Data is used only for event attendance & safety.
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwiAMAFfE52wzWvk3rCfogqwm-hwL-9jVvvm1Mo1aooeYVPnve9-G-g0CSst9f972Qr3Q/exec";

let selectedAdults = 0;
let selectedChildren = 0;

// ADMIN CHECK
function isAdmin(){
  return new URLSearchParams(window.location.search).get("admin")==="true";
}

// UK WEEK
function getWeek(){
  const d=new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const y=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-y)/86400000)+1)/7);
}

// GROUP SELECT
function selectGroup(e,a,c){
  selectedAdults=a;
  selectedChildren=c;

  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  e.currentTarget.classList.add("active");
}

// MESSAGE
function msg(t){
  document.getElementById("msg").innerText=t;
}

// LOAD STATS (ADMIN ONLY)
function loadCounts(){
  if(!isAdmin()) return;

  fetch(API_URL)
  .then(r=>r.json())
  .then(data=>{
    let a=0,c=0;
    data.forEach(x=>{
      a+=Number(x.adults||0);
      c+=Number(x.children||0);
    });

    adults.innerText=a;
    children.innerText=c;
    total.innerText=a+c;
  });
}

// AUTO REFRESH EVERY 30 SECONDS
setInterval(loadCounts,30000);

// SUBMIT
document.getElementById("form").onsubmit=function(e){
  e.preventDefault();

  const name=nameInput.value.trim();
  const email=emailInput.value.trim().toLowerCase();
  const phone=phoneInput.value.trim();

  const uk=/^(?:\+44|0)7\d{9}$/;
  if(!uk.test(phone)) return msg("Invalid UK number");
  if(!selectedAdults && !selectedChildren) return msg("Select group");

  fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      data:[{
        name,
        email,
        phone,
        adults:selectedAdults,
        children:selectedChildren,
        time:new Date().toLocaleString("en-GB"),
        week:getWeek()
      }]
    })
  })
  .then(()=>msg("Checked in successfully"))
  .catch(()=>msg("Error"));
}

// INIT
window.onload=function(){
  if(isAdmin()){
    document.getElementById("statsBox").style.display="block";
    loadCounts();
  }
};

const nameInput=document.getElementById("name");
const emailInput=document.getElementById("email");
const phoneInput=document.getElementById("phone");

</script>

</body>
</html>
