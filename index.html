<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aylesbury HSS Check-In</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <style>

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background:
        linear-gradient(
          180deg,
          #f8f9ff 0%,
          #eef2ff 100%
        );
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        sans-serif;
      color: #111827;
      text-align: center;
    }

    .container {
      max-width: 460px;
      margin: auto;
    }

    h1 {
      font-size: 38px;
      margin-top: 10px;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(18px);
      border-radius: 34px;
      padding: 24px;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 18px 18px;
      border-radius: 22px;
      border: 1px solid #e5e7eb;
      font-size: 16px;
      background: rgba(255,255,255,0.9);
      transition: all 0.25s ease;
      outline: none;
    }

    input:focus {
      border-color: #007AFF;
      box-shadow:
        0 0 0 4px rgba(0,122,255,0.12);
      transform: translateY(-1px);
    }

    .counter-section {
      display: flex;
      gap: 14px;
      margin-top: 22px;
    }

    .counter-box {
      flex: 1;
      background: rgba(248,250,252,0.9);
      border-radius: 28px;
      padding: 20px;
      transition: all 0.25s ease;
      border: 1px solid #eef2f7;
    }

    .counter-box:hover {
      transform: translateY(-2px);
    }

    .counter-title {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .counter-value {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .counter-buttons {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .circle-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #007AFF;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow:
        0 6px 14px rgba(0,122,255,0.25);
    }

    .circle-btn:active {
      transform: scale(0.92);
      background: #005fd1;
    }

    .circle-btn.clicked {
      background: #34C759;
      box-shadow:
        0 6px 14px rgba(52,199,89,0.3);
    }

    .checkin-btn {
      width: 100%;
      margin-top: 26px;
      padding: 18px;
      border-radius: 24px;
      border: none;
      background:
        linear-gradient(
          135deg,
          #007AFF,
          #5E5CE6
        );
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow:
        0 12px 24px rgba(0,122,255,0.25);
    }

    .checkin-btn:hover {
      transform: translateY(-2px);
    }

    .checkin-btn:active {
      transform: scale(0.97);
    }

    .checkin-btn.loading {
      background:
        linear-gradient(
          135deg,
          #9ca3af,
          #6b7280
        );
    }

    .admin-btn {
      margin-top: 22px;
      background: transparent;
      border: none;
      color: #6b7280;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    #msg {
      margin-top: 18px;
      font-weight: 600;
      font-size: 15px;
      min-height: 20px;
    }

    .success {
      color: #16a34a;
    }

    .error {
      color: #dc2626;
    }

    #adminPanel {
      display: none;
      margin-top: 28px;
    }

    .stats {
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }

    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 18px;
      box-shadow:
        0 6px 24px rgba(0,0,0,0.06);
    }

    .stat-title {
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
    }

    .stat-number {
      font-size: 34px;
      font-weight: 700;
      margin-top: 8px;
      letter-spacing: -1px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Event Check-In</h1>

  <div class="subtitle">
    Aylesbury HSS Shakha
  </div>

  <div class="card">

    <div class="input-group">
      <input
        type="text"
        id="name"
        placeholder="Full Name"
        autocomplete="name"
      >
    </div>

    <div class="input-group">
      <input
        type="email"
        id="email"
        placeholder="Email Address (Optional)"
        autocomplete="email"
      >
    </div>

    <div class="input-group">
      <input
        type="tel"
        id="phone"
        placeholder="UK Mobile Number (07xxxxxxxxx)"
        autocomplete="tel"
        inputmode="numeric"
      >
    </div>

    <div class="counter-section">

      <div class="counter-box">

        <div class="counter-title">
          Adults
        </div>

        <div
          class="counter-value"
          id="adultCountDisplay"
        >
          1
        </div>

        <div class="counter-buttons">

          <button
            class="circle-btn"
            onclick="changeAdults(-1, this)"
          >
            −
          </button>

          <button
            class="circle-btn"
            onclick="changeAdults(1, this)"
          >
            +
          </button>

        </div>

      </div>

      <div class="counter-box">

        <div class="counter-title">
          Children
        </div>

        <div
          class="counter-value"
          id="childCountDisplay"
        >
          0
        </div>

        <div class="counter-buttons">

          <button
            class="circle-btn"
            onclick="changeChildren(-1, this)"
          >
            −
          </button>

          <button
            class="circle-btn"
            onclick="changeChildren(1, this)"
          >
            +
          </button>

        </div>

      </div>

    </div>

    <button
      class="checkin-btn"
      id="checkinBtn"
      onclick="checkIn()"
    >
      Check In
    </button>

    <p id="msg"></p>

  </div>

  <button
    class="admin-btn"
    onclick="openAdmin()"
  >
    Admin Dashboard
  </button>

  <div id="adminPanel">

    <div class="stats">

      <div class="stat-box">

        <div class="stat-title">
          Total
        </div>

        <div
          class="stat-number"
          id="total"
        >
          0
        </div>

      </div>

      <div class="stat-box">

        <div class="stat-title">
          Adults
        </div>

        <div
          class="stat-number"
          id="adults"
        >
          0
        </div>

      </div>

      <div class="stat-box">

        <div class="stat-title">
          Kids
        </div>

        <div
          class="stat-number"
          id="children"
        >
          0
        </div>

      </div>

    </div>

  </div>

</div>

<script>

  const API_URL =
    "https://sheetdb.io/api/v1/ce2vzb2cgzonz";

  const ADMIN_PIN = "1234";

  let adultCount = 1;
  let childCount = 0;

  window.onload = function() {

    document.getElementById("name").value =
      localStorage.getItem("name") || "";

    document.getElementById("email").value =
      localStorage.getItem("email") || "";

    document.getElementById("phone").value =
      localStorage.getItem("phone") || "";

  };

  function flashButton(button) {

    button.classList.add("clicked");

    setTimeout(() => {
      button.classList.remove("clicked");
    }, 220);
  }

  function updateCounters() {

    document.getElementById("adultCountDisplay")
      .innerText = adultCount;

    document.getElementById("childCountDisplay")
      .innerText = childCount;
  }

  function changeAdults(value, button) {

    flashButton(button);

    adultCount += value;

    if (adultCount < 1) {
      adultCount = 1;
    }

    updateCounters();
  }

  function changeChildren(value, button) {

    flashButton(button);

    childCount += value;

    if (childCount < 0) {
      childCount = 0;
    }

    updateCounters();
  }

  function getWeekNumber() {

    const date = new Date();

    date.setHours(0,0,0,0);

    date.setDate(
      date.getDate() + 4 - (date.getDay() || 7)
    );

    const yearStart =
      new Date(date.getFullYear(),0,1);

    return Math.ceil(
      (((date - yearStart) / 86400000) + 1)/7
    );
  }

  function openAdmin() {

    const pin =
      prompt("Enter Admin PIN");

    if (pin !== ADMIN_PIN) {

      alert("Wrong PIN");

      return;
    }

    document.getElementById("adminPanel")
      .style.display = "block";

    loadStats();
  }

  function loadStats() {

    fetch(API_URL)

      .then(res => res.json())

      .then(data => {

        let totalAdults = 0;
        let totalChildren = 0;

        data.forEach(row => {

          totalAdults +=
            Number(row.adults || 0);

          totalChildren +=
            Number(row.children || 0);

        });

        document.getElementById("adults")
          .innerText = totalAdults;

        document.getElementById("children")
          .innerText = totalChildren;

        document.getElementById("total")
          .innerText =
          totalAdults + totalChildren;

      });

  }

  function checkIn() {

    const name =
      document.getElementById("name")
      .value.trim();

    const email =
      document.getElementById("email")
      .value.trim()
      .toLowerCase();

    const phone =
      document.getElementById("phone")
      .value.trim();

    const msg =
      document.getElementById("msg");

    const btn =
      document.getElementById("checkinBtn");

    const ukPhoneRegex =
      /^(\+44|0)7\d{9}$/;

    msg.className = "";

    if (!name || !phone) {

      msg.innerText =
        "Name and UK mobile number are required";

      msg.classList.add("error");

      return;
    }

    if (!ukPhoneRegex.test(phone)) {

      msg.innerText =
        "Enter a valid UK mobile number";

      msg.classList.add("error");

      return;
    }

    btn.disabled = true;

    btn.classList.add("loading");

    btn.innerText = "Checking In...";

    const currentWeek =
      getWeekNumber();

    fetch(API_URL)

      .then(res => res.json())

      .then(data => {

        const alreadyExists = data.some(row => {

          const sameWeek =
            Number(row.week) === currentWeek;

          const samePhone =
            row.emergency_contact === phone;

          const sameEmail =
            email &&
            row.email &&
            row.email.toLowerCase() === email;

          return sameWeek &&
            (samePhone || sameEmail);

        });

        if (alreadyExists) {

          msg.innerText =
            "Already checked in this week";

          msg.classList.add("error");

          btn.disabled = false;

          btn.classList.remove("loading");

          btn.innerText = "Check In";

          return;
        }

        localStorage.setItem("name", name);
        localStorage.setItem("email", email);
        localStorage.setItem("phone", phone);

        fetch(API_URL, {

          method: "POST",

          headers: {
            "Content-Type":
            "application/json"
          },

          body: JSON.stringify({

            data: [{

              name: name,

              email: email,

              emergency_contact: phone,

              adults: adultCount,

              children: childCount,

              country: "United Kingdom",

              time:
                new Date().toLocaleString(
                  "en-GB"
                ),

              week:
                currentWeek

            }]

          })

        })

        .then(() => {

          msg.innerText =
            `Checked in successfully for ${adultCount} adult(s) and ${childCount} child(ren)`;

          msg.classList.add("success");

          adultCount = 1;
          childCount = 0;

          updateCounters();

          btn.disabled = false;

          btn.classList.remove("loading");

          btn.innerText = "Check In";

        })

        .catch(() => {

          msg.innerText =
            "Error submitting";

          msg.classList.add("error");

          btn.disabled = false;

          btn.classList.remove("loading");

          btn.innerText = "Check In";

        });

      });

  }

  if ("serviceWorker" in navigator) {

    navigator.serviceWorker
      .register("service-worker.js");

  }

</script>

</body>
</html>
