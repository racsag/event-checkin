<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Check-In</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: radial-gradient(circle at top, #1b2436, #0b1220);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: white;
}

.container {
  width: 92%;
  max-width: 420px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
  margin: 0;
  font-size: 24px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 18px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.25);
  color: white;
  outline: none;
}

input::placeholder {
  color: rgba(255,255,255,0.4);
}

/* COUNTER (your original style) */
.counter {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

.counter button {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: #3b82f6;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

.counter button:active {
  transform: scale(0.95);
}

.counter span {
  font-size: 16px;
  font-weight: 500;
}

/* SUBMIT BUTTON (Apple style) */
button#submitBtn {
  width: 100%;
  margin-top: 18px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #3b82f6;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

button:active {
  transform: scale(0.97);
}

#message {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
}

.footer {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-top: 14px;
}
</style>
</head>

<body>

<div class="container">

  <h2>Check-In</h2>
  <div class="subtitle">Welcome to the Shakha</div>

  <form id="form">

    <input name="name" placeholder="Full Name *" required>
    <input name="email" placeholder="Email (optional)">
    <input name="phone" placeholder="UK Phone * (07123456789)" required>

    <!-- COUNTERS -->
    <label>Adults</label>
    <div class="counter">
      <button type="button" id="adultMinus">-</button>
      <span id="adultCountDisplay">1</span>
      <button type="button" id="adultPlus">+</button>
    </div>
    <input type="hidden" name="adults" id="adults" value="1">

    <label>Children</label>
    <div class="counter">
      <button type="button" id="childMinus">-</button>
      <span id="childCountDisplay">0</span>
      <button type="button" id="childPlus">+</button>
    </div>
    <input type="hidden" name="children" id="children" value="0">

    <button type="submit" id="submitBtn">Complete Check-In</button>

    <div id="message"></div>

    <div class="footer">
     We collect your name and contact details solely for event attendance management and emergency purposes. Your data will be stored securely and will not be shared with third parties. By checking in, you consent to this use of your information.
    </div>

  </form>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbyODBejyoNIlFzfbcFtm94fw1h8nPGPu0GLm89rIjBwMXC7SVp5uMoDWEzCMoqGpu88/exec";

const form = document.getElementById("form");
const msg = document.getElementById("message");

let adults = 1;
let children = 0;

function update() {
  document.getElementById("adultCountDisplay").innerText = adults;
  document.getElementById("childCountDisplay").innerText = children;
  document.getElementById("adults").value = adults;
  document.getElementById("children").value = children;
}

document.getElementById("adultPlus").onclick = () => { adults++; update(); };
document.getElementById("adultMinus").onclick = () => { if(adults>1) adults--; update(); };

document.getElementById("childPlus").onclick = () => { children++; update(); };
document.getElementById("childMinus").onclick = () => { if(children>0) children--; update(); };

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = new FormData(form);
  data.append("date", new Date().toISOString().split("T")[0]);

  msg.innerText = "Submitting...";

  try {
    const res = await fetch(sheetURL, {
      method: "POST",
      body: data
    });

    const text = await res.text();

    if (text === "DUPLICATE") {
      msg.innerText = "Already registered";
      msg.style.color = "#ef4444";
      return;
    }

    if (text === "Success") {
      msg.innerText = "Check-in successful ✓";
      msg.style.color = "#22c55e";
      form.reset();
      adults = 1;
      children = 0;
      update();
    }

  } catch (err) {
    msg.innerText = "Network error";
    msg.style.color = "#ef4444";
  }
});
</script>

</body>
</html>
