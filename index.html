<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Check-In</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <style>

    body {
      margin: 0;
      padding: 20px;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #111;
      text-align: center;
    }

    .container {
      max-width: 450px;
      margin: auto;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 18px;
      border: 1px solid #ddd;
      font-size: 16px;
      box-sizing: border-box;
      background: #fafafa;
    }

    .counter-section {
      display: flex;
      gap: 14px;
      margin-top: 20px;
    }

    .counter-box {
      flex: 1;
      background: #f8f8f8;
      border-radius: 24px;
      padding: 18px;
    }

    .counter-title {
      font-size: 16px;
      color: #666;
      margin-bottom: 10px;
    }

    .counter-value {
      font-size: 38px;
      font-weight: bold;
    }

    .counter-buttons {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .circle-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #007AFF;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    .checkin-btn {
      width: 100%;
      margin-top: 24px;
      padding: 18px;
      border-radius: 20px;
      border: none;
      background: #007AFF;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .admin-btn {
      margin-top: 20px;
      background: transparent;
      border: none;
      color: #666;
      font-size: 14px;
      cursor: pointer;
    }

    #msg {
      margin-top: 18px;
      font-weight: 600;
      font-size: 16px;
    }

    #adminPanel {
      display: none;
      margin-top: 25px;
    }

    .stats {
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    .stat-box {
      flex: 1;
      background: white;
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }

    .stat-title {
      color: #666;
      font-size: 14px;
    }

    .stat-number {
      font-size: 30px;
      font-weight: bold;
      margin-top: 8px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Event Check-In</h1>

  <div class="card">

    <input
      type="text"
      id="name"
      placeholder="Full Name"
    >

    <input
  type="email"
  id="email"
  placeholder="Email Address (Optional)"
>

    <input
      type="tel"
      id="phone"
      placeholder="Emergency Contact"
    >

    <!-- Counters -->

    <div class="counter-section">

      <!-- Adults -->

      <div class="counter-box">

        <div class="counter-title">
          Adults
        </div>

        <div
          class="counter-value"
          id="adultCount"
        >
          1
        </div>

        <div class="counter-buttons">

          <button
            class="circle-btn"
            onclick="changeAdults(-1)"
          >
            −
          </button>

          <button
            class="circle-btn"
            onclick="changeAdults(1)"
          >
            +
          </button>

        </div>

      </div>

      <!-- Children -->

      <div class="counter-box">

        <div class="counter-title">
          Children
        </div>

        <div
          class="counter-value"
          id="childCount"
        >
          0
        </div>

        <div class="counter-buttons">

          <button
            class="circle-btn"
            onclick="changeChildren(-1)"
          >
            −
          </button>

          <button
            class="circle-btn"
            onclick="changeChildren(1)"
          >
            +
          </button>

        </div>

      </div>

    </div>

    <!-- Submit -->

    <button
      class="checkin-btn"
      onclick="checkIn()"
    >
      Check In
    </button>

    <p id="msg"></p>

  </div>

  <!-- Admin Button -->

  <button
    class="admin-btn"
    onclick="openAdmin()"
  >
    Admin Dashboard
  </button>

  <!-- Hidden Admin Panel -->

  <div id="adminPanel">

    <div class="stats">

      <div class="stat-box">

        <div class="stat-title">
          Total
        </div>

        <div
          class="stat-number"
          id="total"
        >
          0
        </div>

      </div>

      <div class="stat-box">

        <div class="stat-title">
          Adults
        </div>

        <div
          class="stat-number"
          id="adults"
        >
          0
        </div>

      </div>

      <div class="stat-box">

        <div class="stat-title">
          Kids
        </div>

        <div
          class="stat-number"
          id="children"
        >
          0
        </div>

      </div>

    </div>

  </div>

</div>

<script>

  // ======================================
  // 🔗 REPLACE WITH YOUR SHEETDB API
  // ======================================

  const API_URL =
    "https://sheetdb.io/api/v1/ce2vzb2cgzonz";

  // ======================================
  // 🔐 ADMIN PIN
  // ======================================

  const ADMIN_PIN = "1234";

  // ======================================
  // COUNTERS
  // ======================================

  let adults = 1;
  let children = 0;

  // ======================================
  // AUTO FILL RETURNING USERS
  // ======================================

  window.onload = function() {

    document.getElementById("name").value =
      localStorage.getItem("name") || "";

    document.getElementById("email").value =
      localStorage.getItem("email") || "";

    document.getElementById("phone").value =
      localStorage.getItem("phone") || "";

  };

  // ======================================
  // UPDATE COUNTER DISPLAY
  // ======================================

  function updateCounters() {

    document.getElementById("adultCount")
      .innerText = adults;

    document.getElementById("childCount")
      .innerText = children;
  }

  // ======================================
  // ADULT BUTTONS
  // ======================================

  function changeAdults(value) {

    adults += value;

    if (adults < 1) {
      adults = 1;
    }

    updateCounters();
  }

  // ======================================
  // CHILD BUTTONS
  // ======================================

  function changeChildren(value) {

    children += value;

    if (children < 0) {
      children = 0;
    }

    updateCounters();
  }

  // ======================================
  // WEEK NUMBER
  // ======================================

  function getWeekNumber() {

    const d = new Date();

    const start =
      new Date(d.getFullYear(), 0, 1);

    return Math.ceil(
      ((d - start) /
      (7 * 24 * 60 * 60 * 1000))
    );
  }

  // ======================================
  // ADMIN LOGIN
  // ======================================

  function openAdmin() {

    const pin =
      prompt("Enter Admin PIN");

    if (pin !== ADMIN_PIN) {

      alert("Wrong PIN");

      return;
    }

    document.getElementById("adminPanel")
      .style.display = "block";

    loadStats();
  }

  // ======================================
  // LOAD ADMIN STATS
  // ======================================

  function loadStats() {

    fetch(API_URL)

      .then(res => res.json())

      .then(data => {

        let totalAdults = 0;
        let totalChildren = 0;

        data.forEach(row => {

          totalAdults +=
            Number(row.adults || 0);

          totalChildren +=
            Number(row.children || 0);

        });

        document.getElementById("adults")
          .innerText = totalAdults;

        document.getElementById("children")
          .innerText = totalChildren;

        document.getElementById("total")
          .innerText =
          totalAdults + totalChildren;

      });

  }

  // ======================================
  // CHECK IN
  // ======================================

  function checkIn() {

    const name =
      document.getElementById("name")
      .value.trim();

    const email =
      document.getElementById("email")
      .value.trim()
      .toLowerCase();

    const phone =
      document.getElementById("phone")
      .value.trim();

    if (!name || !phone) {

  document.getElementById("msg")
    .innerText =
    "Name and phone number are required";

  return;
    }

    const currentWeek =
      getWeekNumber();

    // ======================================
    // DUPLICATE CHECK
    // ======================================

    fetch(API_URL)

      .then(res => res.json())

      .then(data => {

        const alreadyExists =

          data.some(row =>

            row.email &&

            row.email.toLowerCase()
            === email &&

            Number(row.week)
            === currentWeek

          );

        if (alreadyExists) {

          document.getElementById("msg")
            .innerText =
            "Already checked in this week";

          return;
        }

        // ======================================
        // SAVE LOCALLY
        // ======================================

        localStorage.setItem(
          "name",
          name
        );

        localStorage.setItem(
          "email",
          email
        );

        localStorage.setItem(
          "phone",
          phone
        );

        // ======================================
        // SEND DATA
        // ======================================

        fetch(API_URL, {

          method: "POST",

          headers: {
            "Content-Type":
            "application/json"
          },

          body: JSON.stringify({

            data: [{

              name: name,

              email: email,

              emergency_contact: phone,

              adults: adults,

              children: children,

              time:
                new Date().toISOString(),

              week:
                currentWeek

            }]

          })

        })

        .then(() => {

          document.getElementById("msg")
            .innerText =
            "Checked in successfully";

          // Reset counters after submit

          adults = 1;
          children = 0;

          updateCounters();

        })

        .catch(() => {

          document.getElementById("msg")
            .innerText =
            "Error submitting";

        });

      });

  }

  // ======================================
  // PWA SERVICE WORKER
  // ======================================

  if ("serviceWorker" in navigator) {

    navigator.serviceWorker
      .register("service-worker.js");

  }

</script>

</body>
  </html>
